<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1e2e"/>
      <stop offset="100%" stop-color="#181825"/>
    </linearGradient>

    <!-- Accent gradient for the architecture boxes -->
    <linearGradient id="purpleGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>

    <!-- Subtle grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#313244" stroke-width="0.5" opacity="0.4"/>
    </pattern>

    <!-- Glow filter for accent elements -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft shadow for boxes -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>

    <!-- Neural network node glow -->
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#grid)"/>

  <!-- Decorative neural-net nodes (background) -->
  <!-- Top-left cluster -->
  <circle cx="80" cy="90" r="3" fill="#6366f1" opacity="0.3"/>
  <circle cx="140" cy="60" r="2" fill="#89b4fa" opacity="0.25"/>
  <circle cx="110" cy="130" r="2.5" fill="#a6e3a1" opacity="0.2"/>
  <line x1="80" y1="90" x2="140" y2="60" stroke="#6366f1" stroke-width="0.5" opacity="0.15"/>
  <line x1="80" y1="90" x2="110" y2="130" stroke="#a6e3a1" stroke-width="0.5" opacity="0.15"/>

  <!-- Top-right cluster -->
  <circle cx="1150" cy="70" r="3" fill="#7c3aed" opacity="0.3"/>
  <circle cx="1200" cy="110" r="2" fill="#89b4fa" opacity="0.25"/>
  <circle cx="1100" cy="120" r="2.5" fill="#a6e3a1" opacity="0.2"/>
  <line x1="1150" y1="70" x2="1200" y2="110" stroke="#7c3aed" stroke-width="0.5" opacity="0.15"/>
  <line x1="1150" y1="70" x2="1100" y2="120" stroke="#89b4fa" stroke-width="0.5" opacity="0.15"/>

  <!-- Bottom-left cluster -->
  <circle cx="100" cy="520" r="2.5" fill="#89b4fa" opacity="0.25"/>
  <circle cx="60" cy="560" r="2" fill="#7c3aed" opacity="0.2"/>
  <circle cx="150" cy="550" r="3" fill="#a6e3a1" opacity="0.2"/>
  <line x1="100" y1="520" x2="60" y2="560" stroke="#89b4fa" stroke-width="0.5" opacity="0.15"/>
  <line x1="100" y1="520" x2="150" y2="550" stroke="#a6e3a1" stroke-width="0.5" opacity="0.15"/>

  <!-- Bottom-right cluster -->
  <circle cx="1180" cy="500" r="2" fill="#6366f1" opacity="0.25"/>
  <circle cx="1220" cy="540" r="3" fill="#89b4fa" opacity="0.2"/>
  <circle cx="1130" cy="530" r="2.5" fill="#a6e3a1" opacity="0.2"/>
  <line x1="1180" y1="500" x2="1220" y2="540" stroke="#6366f1" stroke-width="0.5" opacity="0.15"/>
  <line x1="1180" y1="500" x2="1130" y2="530" stroke="#a6e3a1" stroke-width="0.5" opacity="0.15"/>

  <!-- Large decorative gradient orbs -->
  <circle cx="200" cy="320" r="200" fill="#7c3aed" opacity="0.03"/>
  <circle cx="1080" cy="320" r="200" fill="#6366f1" opacity="0.03"/>

  <!-- ==================== LOGO AREA ==================== -->

  <!-- Book + neural icon -->
  <g transform="translate(540, 130)">
    <!-- Open book shape -->
    <path d="M-30 20 Q-30 -5 0 -15 Q30 -5 30 20 L30 45 Q30 25 0 18 Q-30 25 -30 45 Z"
          fill="none" stroke="url(#purpleGlow)" stroke-width="2.5" filter="url(#glow)"/>
    <!-- Book spine -->
    <line x1="0" y1="-15" x2="0" y2="18" stroke="#7c3aed" stroke-width="1.5" opacity="0.6"/>
    <!-- Page lines left -->
    <line x1="-20" y1="8" x2="-6" y2="4" stroke="#89b4fa" stroke-width="1" opacity="0.5"/>
    <line x1="-18" y1="16" x2="-6" y2="11" stroke="#89b4fa" stroke-width="1" opacity="0.4"/>
    <line x1="-20" y1="24" x2="-6" y2="18" stroke="#89b4fa" stroke-width="1" opacity="0.3"/>
    <!-- Page lines right -->
    <line x1="20" y1="8" x2="6" y2="4" stroke="#a6e3a1" stroke-width="1" opacity="0.5"/>
    <line x1="18" y1="16" x2="6" y2="11" stroke="#a6e3a1" stroke-width="1" opacity="0.4"/>
    <line x1="20" y1="24" x2="6" y2="18" stroke="#a6e3a1" stroke-width="1" opacity="0.3"/>

    <!-- Neural dots around book -->
    <circle cx="-42" cy="-5" r="3" fill="#89b4fa" opacity="0.6" filter="url(#glow)"/>
    <circle cx="42" cy="-5" r="3" fill="#a6e3a1" opacity="0.6" filter="url(#glow)"/>
    <circle cx="0" cy="-30" r="3" fill="#7c3aed" opacity="0.6" filter="url(#glow)"/>
    <circle cx="-35" cy="35" r="2.5" fill="#a6e3a1" opacity="0.4"/>
    <circle cx="35" cy="35" r="2.5" fill="#89b4fa" opacity="0.4"/>

    <!-- Neural connections -->
    <line x1="-42" y1="-5" x2="-30" y2="0" stroke="#89b4fa" stroke-width="0.8" opacity="0.3"/>
    <line x1="42" y1="-5" x2="30" y2="0" stroke="#a6e3a1" stroke-width="0.8" opacity="0.3"/>
    <line x1="0" y1="-30" x2="0" y2="-15" stroke="#7c3aed" stroke-width="0.8" opacity="0.3"/>
    <line x1="-42" y1="-5" x2="0" y2="-30" stroke="#6366f1" stroke-width="0.5" opacity="0.2"/>
    <line x1="42" y1="-5" x2="0" y2="-30" stroke="#6366f1" stroke-width="0.5" opacity="0.2"/>
  </g>

  <!-- ==================== TITLE ==================== -->

  <text x="640" y="235" text-anchor="middle"
        font-family="'SF Pro Display', 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif"
        font-size="72" font-weight="800" letter-spacing="-2" fill="#cdd6f4">
    llm-wiki
  </text>

  <!-- Accent underline -->
  <rect x="520" y="250" width="240" height="3" rx="1.5" fill="url(#purpleGlow)" opacity="0.6"/>

  <!-- ==================== SUBTITLE ==================== -->

  <text x="640" y="295" text-anchor="middle"
        font-family="'SF Pro Text', 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif"
        font-size="22" font-weight="400" fill="#a6adc8" letter-spacing="0.5">
    Turn AI coding sessions into a searchable knowledge base
  </text>

  <!-- ==================== 3-LAYER ARCHITECTURE ==================== -->

  <g transform="translate(640, 410)">
    <!-- raw/ box -->
    <g transform="translate(-280, 0)">
      <rect x="-90" y="-35" width="180" height="70" rx="12"
            fill="#1e1e2e" stroke="#a6e3a1" stroke-width="1.5" filter="url(#shadow)" opacity="0.95"/>
      <rect x="-90" y="-35" width="180" height="70" rx="12"
            fill="#a6e3a1" opacity="0.05"/>
      <!-- Terminal prompt icon -->
      <text x="-55" y="-3" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace"
            font-size="18" fill="#a6e3a1" opacity="0.7">&gt;_</text>
      <text x="-25" y="-4" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace"
            font-size="20" font-weight="600" fill="#a6e3a1">raw/</text>
      <text x="0" y="18" text-anchor="middle"
            font-family="'SF Pro Text', 'Inter', system-ui, sans-serif"
            font-size="12" fill="#6c7086">session transcripts</text>
    </g>

    <!-- Arrow 1: raw -> wiki -->
    <g transform="translate(-130, 0)">
      <line x1="0" y1="0" x2="60" y2="0" stroke="#585b70" stroke-width="1.5"/>
      <polygon points="60,-5 70,0 60,5" fill="#585b70"/>
      <text x="35" y="-10" text-anchor="middle"
            font-family="'SF Pro Text', 'Inter', system-ui, sans-serif"
            font-size="10" fill="#585b70">ingest</text>
    </g>

    <!-- wiki/ box -->
    <g transform="translate(0, 0)">
      <rect x="-90" y="-35" width="180" height="70" rx="12"
            fill="#1e1e2e" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadow)" opacity="0.95"/>
      <rect x="-90" y="-35" width="180" height="70" rx="12"
            fill="#7c3aed" opacity="0.05"/>
      <!-- Wiki/pages icon (SVG book shape) -->
      <g transform="translate(-55, -12)" opacity="0.7">
        <path d="M0 4 Q0 0 6 0 L14 0 Q14 0 14 4 L14 14 Q14 14 6 12 Q0 14 0 14 Z" fill="none" stroke="#7c3aed" stroke-width="1.5"/>
        <line x1="7" y1="0" x2="7" y2="12" stroke="#7c3aed" stroke-width="1" opacity="0.5"/>
      </g>
      <text x="-25" y="-4" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace"
            font-size="20" font-weight="600" fill="#c4b5fd">wiki/</text>
      <text x="0" y="18" text-anchor="middle"
            font-family="'SF Pro Text', 'Inter', system-ui, sans-serif"
            font-size="12" fill="#6c7086">knowledge pages</text>
    </g>

    <!-- Arrow 2: wiki -> site -->
    <g transform="translate(150, 0)">
      <line x1="0" y1="0" x2="60" y2="0" stroke="#585b70" stroke-width="1.5"/>
      <polygon points="60,-5 70,0 60,5" fill="#585b70"/>
      <text x="35" y="-10" text-anchor="middle"
            font-family="'SF Pro Text', 'Inter', system-ui, sans-serif"
            font-size="10" fill="#585b70">build</text>
    </g>

    <!-- site/ box -->
    <g transform="translate(280, 0)">
      <rect x="-90" y="-35" width="180" height="70" rx="12"
            fill="#1e1e2e" stroke="#89b4fa" stroke-width="1.5" filter="url(#shadow)" opacity="0.95"/>
      <rect x="-90" y="-35" width="180" height="70" rx="12"
            fill="#89b4fa" opacity="0.05"/>
      <!-- Globe icon (SVG circle + meridians) -->
      <g transform="translate(-55, -12)" opacity="0.7">
        <circle cx="7" cy="7" r="7" fill="none" stroke="#89b4fa" stroke-width="1.3"/>
        <ellipse cx="7" cy="7" rx="3.5" ry="7" fill="none" stroke="#89b4fa" stroke-width="0.8"/>
        <line x1="0" y1="7" x2="14" y2="7" stroke="#89b4fa" stroke-width="0.8"/>
      </g>
      <text x="-25" y="-4" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace"
            font-size="20" font-weight="600" fill="#89b4fa">site/</text>
      <text x="0" y="18" text-anchor="middle"
            font-family="'SF Pro Text', 'Inter', system-ui, sans-serif"
            font-size="12" fill="#6c7086">static HTML</text>
    </g>

    <!-- Connection lines below boxes (feedback/cross-reference) -->
    <path d="M-280 40 Q-280 65 0 65 Q280 65 280 40"
          fill="none" stroke="#45475a" stroke-width="0.8" stroke-dasharray="4 4" opacity="0.4"/>
    <text x="0" y="80" text-anchor="middle"
          font-family="'SF Pro Text', 'Inter', system-ui, sans-serif"
          font-size="10" fill="#45475a" opacity="0.6">cross-linked &amp; searchable</text>
  </g>

  <!-- ==================== FEATURE PILLS ==================== -->

  <g transform="translate(640, 520)">
    <!-- Pill 1 -->
    <g transform="translate(-260, 0)">
      <rect x="-65" y="-14" width="130" height="28" rx="14"
            fill="#313244" opacity="0.6"/>
      <text x="0" y="5" text-anchor="middle"
            font-family="'SF Pro Text', 'Inter', system-ui, sans-serif"
            font-size="12" font-weight="500" fill="#89b4fa">wikilinks</text>
    </g>
    <!-- Pill 2 -->
    <g transform="translate(-100, 0)">
      <rect x="-70" y="-14" width="140" height="28" rx="14"
            fill="#313244" opacity="0.6"/>
      <text x="0" y="5" text-anchor="middle"
            font-family="'SF Pro Text', 'Inter', system-ui, sans-serif"
            font-size="12" font-weight="500" fill="#a6e3a1">auto-ingest</text>
    </g>
    <!-- Pill 3 -->
    <g transform="translate(60, 0)">
      <rect x="-60" y="-14" width="120" height="28" rx="14"
            fill="#313244" opacity="0.6"/>
      <text x="0" y="5" text-anchor="middle"
            font-family="'SF Pro Text', 'Inter', system-ui, sans-serif"
            font-size="12" font-weight="500" fill="#c4b5fd">queryable</text>
    </g>
    <!-- Pill 4 -->
    <g transform="translate(210, 0)">
      <rect x="-65" y="-14" width="130" height="28" rx="14"
            fill="#313244" opacity="0.6"/>
      <text x="0" y="5" text-anchor="middle"
            font-family="'SF Pro Text', 'Inter', system-ui, sans-serif"
            font-size="12" font-weight="500" fill="#f9e2af">static site</text>
    </g>
  </g>

  <!-- ==================== BOTTOM URL ==================== -->

  <text x="640" y="600" text-anchor="middle"
        font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace"
        font-size="16" fill="#585b70" letter-spacing="1">
    github.com/Pratiyush/llm-wiki
  </text>

  <!-- Top and bottom accent lines -->
  <rect x="0" y="0" width="1280" height="2" fill="url(#purpleGlow)" opacity="0.4"/>
  <rect x="0" y="638" width="1280" height="2" fill="url(#purpleGlow)" opacity="0.2"/>
</svg>